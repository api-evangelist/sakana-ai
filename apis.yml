name: Sakana AI
x-type: company
description: >-
  Sakana AI is a Tokyo-based AI R&D company founded by ex-Google researchers focused on
  collective intelligence, evolutionary optimization, and nature-inspired AI methods. The
  company's first commercial product is Sakana Fugu - a multi-agent orchestration system
  with an OpenAI-compatible API (currently in beta). Sakana also publishes Sakana Chat
  (consumer) and Sakana Marlin (beta).
