meters:
- name: orchestrated_tasks
  description: Tasks routed by Fugu (anticipated meter).
  unit: tasks
  aggregation: sum
  dimensions: [variant, account]
- name: underlying_model_spend
  description: Pass-through cost of underlying frontier model calls (anticipated).
  unit: usd
  aggregation: sum
  dimensions: [provider, model, account]
principles:
- name: Visibility
  description: Beta participants should track Fugu usage and underlying model costs separately.
- name: Allocation
  description: Use API key per workload/team; map underlying model spend to consumers.
- name: Optimization
  description: Choose Fugu Mini for low-latency paths; Fugu Ultra for complex orchestrations.
- name: Accountability
  description: Engage Sakana for production pricing once GA.
